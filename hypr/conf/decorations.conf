# #######################################################################################
# Hyprland Config: Decorations
# #######################################################################################

source = ~/.config/hypr/colors.conf

general {
    gaps_in  = 4
    gaps_out = 12

    border_size = 1

    col.active_border   = rgba(adc6ff44)
    col.inactive_border = rgba(ffffff08)

    resize_on_border        = true
    extend_border_grab_area = 8
    allow_tearing           = false
}

decoration {
    rounding       = 14
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.9

    dim_inactive  = true
    dim_strength  = 0.05

    shadow {
        enabled        = true
        range          = 20
        render_power   = 4
        color          = rgba(00000055)
        color_inactive = rgba(00000025)
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        new_optimizations = true
        xray              = false
        noise             = 0.01
        contrast          = 0.9
        brightness        = 0.9
        vibrancy          = 0.15
        vibrancy_darkness = 0.0
        special           = true
        popups            = true
    }
}
