# #######################################################################################
# Hyprland Config: Animations
# #######################################################################################

animations {
    enabled = yes

    # ── Bezier curves ──────────────────────────────────────────────
    bezier = linear,      0.0,  0.0,  1.0,  1.0
    bezier = easeOut,     0.0,  0.0,  0.58, 1.0
    bezier = easeIn,      0.42, 0.0,  1.0,  1.0
    bezier = easeInOut,   0.42, 0.0,  0.58, 1.0
    bezier = funCurve,    0.17, 0.89, 0.32, 1.28
    bezier = smoothOut,   0.36, 0,    0.66, -0.56
    bezier = smoothIn,    0.25, 1,    0.5,  1
    bezier = overshot,    0.05, 0.9,  0.1,  1.1
    bezier = liner,       1,    1,    1,    1

    # ── Window animations ──────────────────────────────────────────
    animation = windows,      1, 5,  funCurve,  slide
    animation = windowsIn,    1, 5,  smoothIn,  slide
    animation = windowsOut,   1, 4,  smoothOut, slide
    animation = windowsMove,  1, 5,  smoothIn,  slide

    # ── Border ────────────────────────────────────────────────────
    animation = border,       1, 10, default
    animation = borderangle,  1, 120, liner, loop

    # ── Fade ──────────────────────────────────────────────────────
    animation = fade,         1, 5, easeInOut
    animation = fadeIn,       1, 5, smoothIn
    animation = fadeOut,      1, 4, smoothOut

    # ── Workspaces ────────────────────────────────────────────────
    animation = workspaces,        1, 5, overshot, slide
    animation = specialWorkspace,  1, 5, smoothIn, slidevert
}
