# #######################################################################################
# Hyprland Config: Window Rules
# https://wiki.hypr.land/Configuring/Window-Rules/
# #######################################################################################

# ── Suppress maximize ─────────────────────────────────────────────
windowrule = suppress_event maximize, match:class .*

# ── Fix XWayland drag issues ──────────────────────────────────────
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false

# ── Float specific apps ───────────────────────────────────────────
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(file-roller)$
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Save File)$
windowrule = float on, match:title ^(Picture-in-Picture)$

# ── Float + size + center for dialogs ────────────────────────────
windowrule {
    name = pavucontrol-float
    match:class = ^(pavucontrol)$
    float  = on
    size   = 800 600
    center = on
}

windowrule {
    name = blueman-float
    match:class = ^(blueman-manager)$
    float  = on
    size   = 700 500
    center = on
}

# ── Picture-in-Picture ────────────────────────────────────────────
windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float            = on
    pin              = on
    keep_aspect_ratio = on
    size             = 400 225
    move             = 100%-420 100%-245
}

# ── Hyprland-run floating terminal ────────────────────────────────
windowrule {
    name = hyprland-run
    match:class = ^(hyprland-run)$
    float = on
    move  = 20 100%-120
}


# ── Cheatsheet ────────────────────────────────────────────────────
windowrule {
    name = cheatsheet
    match:class = ^(hypr.cheatsheet)$
    float  = on
    center = on
    size   = 700 820
}

# ── Opacity rules ─────────────────────────────────────────────────
windowrule = opacity 1.0 override 1.0 override, match:class ^(zen-browser)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(mpv)$

# ── Idle inhibit ──────────────────────────────────────────────────
windowrule = idle_inhibit fullscreen, match:class .*
windowrule = idle_inhibit focus, match:class ^(mpv)$

# ── Layer rules ───────────────────────────────────────────────────
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window
