# #######################################################################################
# Hyprland Config: Input
# #######################################################################################

input {
    kb_layout  = us
    kb_variant =
    kb_model   =
    kb_options =
    kb_rules   =

    numlock_by_default = true
    repeat_rate        = 35
    repeat_delay       = 300

    follow_mouse   = 1
    mouse_refocus  = true
    sensitivity    = 0

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        tap-and-drag         = true
        drag_lock            = true
        disable_while_typing = true
        scroll_factor        = 0.8
        middle_button_emulation = false
    }
}

# ── Gestures ──────────────────────────────────────────────────────
gestures {
    gesture = 3, horizontal, workspace   # swipe left/right → switch workspace
    gesture = 3, up,         fullscreen  # swipe up         → fullscreen
    gesture = 3, down,       close       # swipe down       → close window
    gesture = 4, horizontal, move        # 4-finger drag    → move window
    gesture = 4, up,         special     # 4-finger up      → scratchpad
}
