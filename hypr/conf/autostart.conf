# #######################################################################################
# Hyprland Config: Autostart
# #######################################################################################

# ── Wallpaper daemon ───────────────────────────────────────────────
exec-once = swww-daemon
exec-once = sleep 0.5 && ~/.config/hypr/scripts/wallpaper.sh $(cat ~/.cache/current_wallpaper 2>/dev/null)

# ── Bar ───────────────────────────────────────────────────────────
exec-once = waybar

# ── App launcher / daemon ──────────────────────────────────────────
exec-once = vicinae server

# ── Notifications ─────────────────────────────────────────────────
exec-once = dunst
exec-once = swaync

# ── Polkit agent ──────────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Clipboard manager ─────────────────────────────────────────────
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Idle / lockscreen ─────────────────────────────────────────────
exec-once = hypridle

# ── GTK dark mode ─────────────────────────────────────────────────
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-dark
exec-once = gsettings set org.gnome.desktop.interface icon-theme MacTahoe
exec-once = gsettings set org.gnome.desktop.interface cursor-theme MacTahoe-cursors
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24

# ── XDG portal ────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
