# Generated by matugen — do not edit manually

general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb({{colors.primary.default.hex_stripped}})
    inner_color = rgb({{colors.surface.default.hex_stripped}})
    font_color = rgb({{colors.on_surface.default.hex_stripped}})
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    check_color = rgb({{colors.secondary.default.hex_stripped}})
    fail_color = rgb({{colors.error.default.hex_stripped}})
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgb({{colors.on_surface.default.hex_stripped}})
    font_size = 72
    font_family = JetBrains Mono Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgb({{colors.outline.default.hex_stripped}})
    font_size = 18
    font_family = JetBrains Mono
    position = 0, -20
    halign = center
    valign = center
}
