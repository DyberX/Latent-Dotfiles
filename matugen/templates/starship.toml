# Generated by matugen — do not edit manually
# Starship prompt with matugen palette
# Place at: ~/.config/starship.toml

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](fg:{{colors.surface.default.hex}})\
$os\
$username\
[](bg:{{colors.primary.default.hex}} fg:{{colors.surface.default.hex}})\
$directory\
[](bg:{{colors.secondary.default.hex}} fg:{{colors.primary.default.hex}})\
$git_branch\
$git_status\
[](bg:{{colors.tertiary.default.hex}} fg:{{colors.secondary.default.hex}})\
$nodejs\
$python\
$rust\
[](fg:{{colors.tertiary.default.hex}})\
$time\
$line_break$character"""

[username]
show_always = true
style_user  = "bg:{{colors.surface.default.hex}} fg:{{colors.on_surface.default.hex}}"
style_root  = "bg:{{colors.error.default.hex}} fg:{{colors.on_error.default.hex}}"
format      = '[ $user ]($style)'

[directory]
style  = "bg:{{colors.primary.default.hex}} fg:{{colors.on_primary.default.hex}}"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
style  = "bg:{{colors.secondary.default.hex}} fg:{{colors.on_secondary.default.hex}}"
format = "[ $symbol$branch ]($style)"
symbol = " "

[git_status]
style  = "bg:{{colors.secondary.default.hex}} fg:{{colors.on_secondary.default.hex}}"
format = "[$all_status$ahead_behind ]($style)"

[nodejs]
style  = "bg:{{colors.tertiary.default.hex}} fg:{{colors.on_tertiary.default.hex}}"
format = "[ $symbol($version) ]($style)"

[python]
style  = "bg:{{colors.tertiary.default.hex}} fg:{{colors.on_tertiary.default.hex}}"
format = "[ $symbol($version) ]($style)"

[time]
disabled   = false
style      = "fg:{{colors.outline.default.hex}}"
format     = "[ $time ]($style)"
time_format = "%H:%M"

[character]
success_symbol = "[❯](bold fg:{{colors.primary.default.hex}})"
error_symbol   = "[❯](bold fg:{{colors.error.default.hex}})"
